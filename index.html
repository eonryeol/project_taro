<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium Tarot AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
    body { font-family: 'Noto Serif KR', serif; background: #020617; color: #e2e8f0; overflow: hidden; height: 100vh; touch-action: none; }
    
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .rotate-z-180 { transform: rotateZ(180deg); }

    /* 펼쳐진 카드 스타일 - 크기를 슬롯과 동일하게 고정하여 애니메이션 일치화 */
    .spread-card {
      position: absolute;
      left: 50%;
      bottom: 0px; 
      transform-origin: center center;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
      width: 60px; height: 96px; /* 모바일 크기 고정 */
      transform: translateX(calc(-50% + var(--tx, 0px))) translateY(var(--ty, 0px)) rotate(var(--rot, 0deg)) scale(1);
    }
    @media (min-width: 768px) {
      .spread-card { width: 85px; height: 136px; } /* PC 크기 고정 */
    }

    .spread-card.dealt:not(.is-selected):hover {
      z-index: 100 !important;
      transform: translateX(calc(-50% + var(--tx, 0px))) translateY(calc(var(--ty, 0px) - 20px)) rotate(var(--rot, 0deg)) scale(1.1) !important;
      filter: brightness(1.3) drop-shadow(0 0 20px rgba(99, 102, 241, 0.8));
      cursor: pointer;
    }

    /* 선택된 카드의 배치 스타일 */
    .spread-card.is-selected {
      z-index: 500 !important;
      pointer-events: none;
      filter: drop-shadow(0 0 15px rgba(129, 140, 248, 0.6));
      transform: translateX(calc(-50% + var(--tx, 0px))) translateY(var(--ty, 0px)) rotate(var(--rot, 0deg)) scale(var(--sc, 1)) !important;
    }

    /* 슬롯 스타일 */
    .slot {
      @apply border-2 border-dashed border-indigo-500/30 rounded-lg flex items-center justify-center absolute transition-all duration-700 bg-indigo-900/10;
      width: 60px; height: 96px;
    }
    @media (min-width: 768px) { .slot { width: 85px; height: 136px; } }

    .slot-label {
      @apply text-[9px] md:text-[11px] text-indigo-200 font-bold absolute -bottom-6 w-max whitespace-nowrap bg-indigo-950/80 px-2 py-0.5 rounded border border-indigo-500/30 shadow-md;
    }

    /* 배열법 선택 카드 - 클릭 영역 확보 */
    .spread-type-card {
      @apply bg-slate-900 border-2 border-slate-800 rounded-xl p-4 cursor-pointer transition-all hover:border-indigo-500 relative;
    }
    .spread-type-card.active { @apply border-indigo-500 bg-indigo-950/30 ring-1 ring-indigo-500; }

    /* 점술사 고양이 마스터 애니메이션 */
    .tarot-master-container {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      opacity: 0.6;
      pointer-events: none;
      text-align: center;
    }

    .tarot-master-img {
      width: 280px;
      height: auto;
      filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4));
      animation: master-float 4s ease-in-out infinite;
    }

    @keyframes master-float {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.4)); }
      50% { transform: translateY(-20px); filter: drop-shadow(0 0 40px rgba(129, 140, 248, 0.7)); }
    }

    /* 레이아웃 */

    #app-container { height: 100vh; display: flex; flex-direction: column; }
    .state-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; width: 100%; max-width: 1200px; margin: 0 auto; overflow: hidden; }
  </style>
</head>
<body>

  <main id="app-container">
    
    <section id="state-start" class="state-section">
      <h1 class="text-3xl md:text-5xl font-bold mb-2 tracking-tighter text-indigo-400">TAROT MASTER AI</h1>
      <p class="text-slate-400 text-sm mb-6">당신의 질문에 대한 영적인 답을 찾으세요.</p>
      
      <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 overflow-y-auto pr-2" style="max-height: 60vh;">
        <div class="space-y-4">
          <div class="flex flex-col gap-1.5 text-left">
            <label class="text-indigo-300 text-xs font-bold uppercase ml-1">생년월일 및 성별</label>
            <div class="flex gap-2">
              <select id="birth-year" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white"></select>
              <select id="birth-month" class="w-20 bg-slate-800 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white"></select>
              <select id="birth-day" class="w-20 bg-slate-800 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white"></select>
            </div>
            <select id="user-gender" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-2 py-2 text-sm text-white mt-1">
              <option value="male">남성</option>
              <option value="female">여성</option>
            </select>
          </div>
          <div class="flex flex-col gap-1.5 text-left">
            <label class="text-indigo-300 text-xs font-bold uppercase ml-1">고민 내용</label>
            <textarea id="user-concern" 
              class="w-full h-24 p-3 bg-slate-800 border border-slate-700 rounded-lg text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 resize-none"
              placeholder="무엇이 궁금하신가요?"></textarea>
          </div>
        </div>

        <div class="flex flex-col gap-1.5 text-left">
          <label class="text-indigo-300 text-xs font-bold uppercase ml-1">배열법 선택</label>
          <div id="spread-selector" class="grid grid-cols-1 gap-2">
            <div class="spread-type-card active" data-spread="one">
              <div class="flex justify-between items-center"><span class="font-bold text-indigo-100">원 카드</span><div class="radio-dot w-4 h-4 rounded-full border-2 border-indigo-500 flex items-center justify-center"><div class="dot-inner w-2 h-2 rounded-full bg-indigo-400"></div></div></div>
              <p class="text-[10px] text-slate-500 mt-1">명쾌한 한 줄 해답 (1장)</p>
            </div>
            <div class="spread-type-card" data-spread="three">
              <div class="flex justify-between items-center"><span class="font-bold text-indigo-100">쓰리 카드</span><div class="radio-dot w-4 h-4 rounded-full border-2 border-indigo-500 flex items-center justify-center"><div class="dot-inner w-2 h-2 rounded-full bg-indigo-400 opacity-0"></div></div></div>
              <p class="text-[10px] text-slate-500 mt-1">과거·현재·미래 분석 (3장)</p>
            </div>
            <div class="spread-type-card" data-spread="horseshoe">
              <div class="flex justify-between items-center"><span class="font-bold text-indigo-100">말발굽</span><div class="radio-dot w-4 h-4 rounded-full border-2 border-indigo-500 flex items-center justify-center"><div class="dot-inner w-2 h-2 rounded-full bg-indigo-400 opacity-0"></div></div></div>
              <p class="text-[10px] text-slate-500 mt-1">7장의 흐름과 조언 (7장)</p>
            </div>
            <div class="spread-type-card" data-spread="celtic">
              <div class="flex justify-between items-center"><span class="font-bold text-indigo-100">켈틱 크로스</span><div class="radio-dot w-4 h-4 rounded-full border-2 border-indigo-500 flex items-center justify-center"><div class="dot-inner w-2 h-2 rounded-full bg-indigo-400 opacity-0"></div></div></div>
              <p class="text-[10px] text-slate-500 mt-1">10장의 심층 분석 (10장)</p>
            </div>
          </div>
        </div>
      </div>

      <button id="btn-shuffle" class="w-full max-w-sm py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-lg font-bold transition-all shadow-xl active:scale-95">
        셔플 시작하기
      </button>
    </section>

    <section id="state-spread" class="state-section hidden relative p-0 max-w-none">
      <!-- 점술사 고양이 마스터 (정중앙 배경) -->
      <div class="tarot-master-container">
        <img src="cat_img.png" alt="Tarot Cat Master" class="tarot-master-img">
        <div class="text-indigo-400/50 text-[10px] mt-2 font-serif tracking-widest uppercase">The Oracle Cat</div>
      </div>

      <div class="absolute top-6 w-full text-center z-[1000]">
        <h2 id="selection-guide" class="text-lg md:text-xl font-bold text-indigo-300 drop-shadow-md">카드를 선택하세요</h2>
        <p id="selection-counter" class="text-indigo-200/70 text-xs mt-1 bg-black/40 inline-block px-3 py-1 rounded-full border border-indigo-500/30">0 / 0 선택됨</p>
      </div>
      
      <div id="unified-container" class="relative w-full h-full flex flex-col pt-24 pb-8 md:pb-12">
        <div id="slots-area" class="relative flex-1 w-full min-h-[250px]">
          <div id="selected-slots" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full pointer-events-none"></div>
        </div>
        <div id="card-grid" class="relative w-full h-[120px] md:h-[160px] shrink-0 mt-4"></div>
      </div>
    </section>

    <section id="state-result" class="state-section hidden overflow-y-auto !justify-start">
      <div class="w-full max-w-5xl py-8">
        <h2 id="result-title" class="text-2xl font-bold mb-8 text-center text-indigo-300">타로 리딩 결과</h2>
        <div id="result-container" class="grid gap-6"></div>
        <div class="mt-12 text-center pb-10">
          <button id="btn-restart" class="px-8 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-white rounded-full font-bold transition-all shadow-lg active:scale-95">다시 질문하기</button>
        </div>
      </div>
    </section>

  </main>

  <script>
    const WORKER_URL = "https://tarobot.1000gkxhd1.workers.dev/";
    
    const tarotDeck = [
      { id: 0, name: "0. The Fool", image: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg" },
      { id: 1, name: "I. The Magician", image: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg" },
      { id: 2, name: "II. The High Priestess", image: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg" },
      { id: 3, name: "III. The Empress", image: "https://upload.wikimedia.org/wikipedia/commons/d/d2/RWS_Tarot_03_Empress.jpg" },
      { id: 4, name: "IV. The Emperor", image: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg" },
      { id: 5, name: "V. The Hierophant", image: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg" },
      { id: 6, name: "VI. The Lovers", image: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_06_Lovers.jpg" },
      { id: 7, name: "VII. The Chariot", image: "https://upload.wikimedia.org/wikipedia/commons/9/9b/RWS_Tarot_07_Chariot.jpg" },
      { id: 8, name: "VIII. Strength", image: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg" },
      { id: 9, name: "IX. The Hermit", image: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg" },
      { id: 10, name: "X. Wheel of Fortune", image: "https://upload.wikimedia.org/wikipedia/commons/3/37/RWS_Tarot_10_Wheel_of_Fortune.jpg" },
      { id: 11, name: "XI. Justice", image: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg" },
      { id: 12, name: "XII. The Hanged Man", image: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg" },
      { id: 13, name: "XIII. Death", image: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg" },
      { id: 14, name: "XIV. Temperance", image: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg" },
      { id: 15, name: "XV. The Devil", image: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg" },
      { id: 16, name: "XVI. The Tower", image: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg" },
      { id: 17, name: "XVII. The Star", image: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg" },
      { id: 18, name: "XVIII. The Moon", image: "https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg" },
      { id: 19, name: "XIX. The Sun", image: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg" },
      { id: 20, name: "XX. Judgement", image: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg" },
      { id: 21, name: "XXI. The World", image: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg" }
    ];

    const spreadConfigs = {
      one: { name: "원 카드", count: 1, positions: ["핵심 조언"], layout: [{ x: 0, y: 0 }] },
      three: { name: "쓰리 카드", count: 3, positions: ["과거", "현재", "미래"], layout: [{ x: -110, y: 0 }, { x: 0, y: 0 }, { x: 110, y: 0 }] },
      horseshoe: {
        name: "말발굽", count: 7, 
        positions: ["과거", "현재", "미래", "조언", "환경", "방해", "결과"],
        layout: [{x:-180, y:90}, {x:-120, y:10}, {x:-60, y:-50}, {x:0, y:-70}, {x:60, y:-50}, {x:120, y:10}, {x:180, y:90}]
      },
      celtic: {
        name: "켈틱 크로스", count: 10,
        positions: ["현재", "장애", "기반", "과거", "목표", "미래", "태도", "환경", "공포", "결과"],
        layout: [
          {x:-110, y:0}, {x:-110, y:0, rot:90}, {x:-110, y:110}, {x:-230, y:0}, {x:-110, y:-110}, {x:20, y:0},
          {x:170, y:160}, {x:170, y:55}, {x:170, y:-50}, {x:170, y:-155}
        ]
      }
    };

    let currentSpread = "one";
    let selectedCards = [];
    let shuffledDeck = [];
    let userConcern = "";
    let userInfo = {};

    // 1. 초기화
    (function init() {
      const year = document.getElementById('birth-year'), month = document.getElementById('birth-month'), day = document.getElementById('birth-day');
      const curY = new Date().getFullYear();
      for(let i=curY; i>=curY-80; i--) year.add(new Option(i+'년', i));
      for(let i=1; i<=12; i++) month.add(new Option(i+'월', i));
      for(let i=1; i<=31; i++) day.add(new Option(i+'일', i));
    })();

    // 2. 배열법 선택 이벤트
    document.getElementById('spread-selector').addEventListener('click', (e) => {
      const card = e.target.closest('.spread-type-card');
      if(!card) return;
      
      document.querySelectorAll('.spread-type-card').forEach(c => {
        c.classList.remove('active');
        c.querySelector('.dot-inner').classList.add('opacity-0');
      });
      card.classList.add('active');
      card.querySelector('.dot-inner').classList.remove('opacity-0');
      currentSpread = card.dataset.spread;
    });

    // 3. 셔플 및 시작
    document.getElementById('btn-shuffle').addEventListener('click', () => {
      userConcern = document.getElementById('user-concern').value.trim() || "나의 전반적인 운세";
      userInfo = {
        year: document.getElementById('birth-year').value,
        month: document.getElementById('birth-month').value,
        day: document.getElementById('birth-day').value,
        gender: document.getElementById('user-gender').value
      };
      
      shuffledDeck = [...tarotDeck].sort(() => Math.random() - 0.5);
      
      document.getElementById('state-start').classList.add('hidden');
      document.getElementById('state-spread').classList.remove('hidden');
      setupSpread();
    });

    function setupSpread() {
      const config = spreadConfigs[currentSpread];
      document.getElementById('selection-guide').textContent = `[${config.name}] 카드를 ${config.count}장 뽑아주세요`;
      document.getElementById('selection-counter').textContent = `0 / ${config.count} 선택됨`;
      
      const isMobile = window.innerWidth <= 768;
      // 핵심 1: 모바일에서는 배열법 레이아웃 간격을 줄여 화면 밖으로 나가지 않게 조절
      const scaleFactor = isMobile ? 0.6 : 1; 

      // 슬롯 배치
      const slotsDiv = document.getElementById('selected-slots');
      slotsDiv.innerHTML = '';
      config.layout.forEach((pos, i) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.style.left = `calc(50% + ${pos.x * scaleFactor}px)`;
        slot.style.top = `calc(50% + ${pos.y * scaleFactor}px)`;
        slot.style.transform = `translate(-50%, -50%) ${pos.rot ? `rotate(${pos.rot}deg)` : ''}`;
        
        const label = document.createElement('span');
        label.className = 'slot-label'; label.textContent = config.positions[i];
        
        // 회전된 카드(장애물 카드 등)의 라벨을 정방향으로 보정
        if(pos.rot) label.style.transform = `rotate(-${pos.rot}deg)`;
        
        slot.appendChild(label);
        slotsDiv.appendChild(slot);
      });

      // 카드 덱 펼치기 (부채꼴)
      const grid = document.getElementById('card-grid');
      grid.innerHTML = '';
      const total = shuffledDeck.length;
      
      // 핵심 2: 기기 너비에 맞춰 부채꼴이 펼쳐지는 최대 너비 동적 계산
      const cardWidth = isMobile ? 60 : 85;
      const screenPadding = isMobile ? 20 : 60;
      const maxFanWidth = Math.min(window.innerWidth - (screenPadding * 2), 900) - cardWidth;
      
      const maxCurve = isMobile ? 35 : 55; // 곡선으로 떨어지는 최대 깊이
      const maxRotation = isMobile ? 45 : 60; // 좌우 끝 카드의 회전각

      shuffledDeck.forEach((card, i) => {
        const el = document.createElement('div');
        el.className = 'spread-card bg-indigo-950 rounded-lg border-2 border-indigo-400/40 shadow-xl bg-cover bg-center opacity-0';
        el.style.backgroundImage = 'url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Tarot_card_back_RWS.jpg")';
        
        const normalized = (i / (total - 1)) * 2 - 1; // -1 (왼쪽 끝) ~ 1 (오른쪽 끝)
        
        const tx = normalized * (maxFanWidth / 2);
        const ty = Math.abs(normalized * normalized) * maxCurve; // 중앙이 가장 높고 가장자리가 낮아지는 포물선 
        const rot = normalized * (maxRotation / 2);
        
        el.style.setProperty('--tx', `${tx}px`);
        el.style.setProperty('--ty', `${ty}px`);
        el.style.setProperty('--rot', `${rot}deg`);
        
        el.dataset.index = i;
        el.addEventListener('click', selectCard);
        grid.appendChild(el);
        
        setTimeout(() => {
          el.classList.add('dealt');
          el.style.opacity = '1';
        }, i * 20); // 애니메이션 딜레이
      });
    }

    function selectCard(e) {
      const config = spreadConfigs[currentSpread];
      if(selectedCards.length >= config.count) return;
      const target = e.currentTarget;
      if(target.classList.contains('is-selected')) return;

      const idx = selectedCards.length;
      selectedCards.push({ ...shuffledDeck[target.dataset.index], isReversed: Math.random() < 0.3 });
      
      target.classList.add('is-selected');
      
      // 핵심 3: 정확한 애니메이션 이동을 위한 절대 좌표 계산
      const slot = document.querySelectorAll('.slot')[idx];
      const slotRect = slot.getBoundingClientRect();
      const gridRect = document.getElementById('card-grid').getBoundingClientRect();
      
      // 슬롯의 화면 상 정중앙 좌표
      const targetX = slotRect.left + slotRect.width / 2;
      const targetY = slotRect.top + slotRect.height / 2;

      // 카드가 생성된 기준점 (bottom: 0, left: 50% 지점의 화면 좌표)
      const originX = gridRect.left + gridRect.width / 2;
      const cardHeight = window.innerWidth <= 768 ? 96 : 136;
      const originY = gridRect.bottom - (cardHeight / 2);

      // 목표점과 기준점의 거리 차이 계산
      const finalTx = targetX - originX;
      const finalTy = targetY - originY;

      target.style.setProperty('--tx', `${finalTx}px`);
      target.style.setProperty('--ty', `${finalTy}px`);
      target.style.setProperty('--rot', `${config.layout[idx].rot || 0}deg`);
      target.style.setProperty('--sc', `1`); // 슬롯과 카드 사이즈를 1:1로 맞췄으므로 스케일은 1로 고정
      target.style.zIndex = 1000 + idx;

      document.getElementById('selection-counter').textContent = `${selectedCards.length} / ${config.count} 선택됨`;
      if(selectedCards.length === config.count) setTimeout(showResults, 1200);
    }

    async function showResults() {
      document.getElementById('state-spread').classList.add('hidden');
      document.getElementById('state-result').classList.remove('hidden');
      const container = document.getElementById('result-container');
      container.innerHTML = '<div class="col-span-full py-20 text-center"><p class="text-indigo-300 animate-pulse text-lg">마스터가 우주의 기운을 모아 리딩 중입니다...</p></div>';
      
      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            concern: userConcern, userInfo,
            spreadName: spreadConfigs[currentSpread].name,
            positions: spreadConfigs[currentSpread].positions,
            cards: selectedCards.map(c => ({ name: c.name, isReversed: c.isReversed }))
          })
        });
        const data = await res.json();
        
        container.innerHTML = '';
        container.className = selectedCards.length > 5 ? 'grid grid-cols-2 md:grid-cols-5 gap-3 md:gap-4' : 'grid grid-cols-1 md:grid-cols-3 gap-6';
        
        selectedCards.forEach((card, i) => {
          const wrap = document.createElement('div');
          wrap.className = 'bg-slate-900/50 p-4 rounded-xl border border-indigo-500/20 text-center flex flex-col items-center';
          wrap.innerHTML = `
            <h3 class="text-indigo-300 font-bold text-xs mb-3 bg-indigo-950/50 px-3 py-1 rounded-full whitespace-nowrap">${spreadConfigs[currentSpread].positions[i]}</h3>
            <div class="perspective-1000 w-20 h-32 md:w-28 md:h-44 mb-4">
              <div class="card-inner relative w-full h-full transform-style-3d transition-transform duration-1000">
                <div class="absolute w-full h-full backface-hidden bg-indigo-950 rounded-lg border border-indigo-500/30 bg-cover bg-center shadow-lg" style="background-image:url('https://upload.wikimedia.org/wikipedia/commons/5/5c/Tarot_card_back_RWS.jpg')"></div>
                <div class="absolute w-full h-full backface-hidden rotate-y-180 rounded-lg overflow-hidden border-2 border-indigo-400 shadow-[0_0_15px_rgba(129,140,248,0.5)]">
                  <img src="${card.image}" class="w-full h-full object-fill ${card.isReversed ? 'rotate-z-180' : ''}">
                </div>
              </div>
            </div>
            <h4 class="text-indigo-100 font-bold text-xs mb-1">${card.name} ${card.isReversed ? '<span class="text-red-400 text-[10px]">(역방향)</span>' : ''}</h4>
            <p class="text-[11px] text-slate-400 leading-relaxed text-left w-full mt-2 break-keep" id="read-${i}"></p>
          `;
          container.appendChild(wrap);
        });

        // 카드 뒤집기 애니메이션 & 개별 해석 출력 적용
        for(let i=0; i<selectedCards.length; i++) {
          await new Promise(r => setTimeout(r, 400));
          container.querySelectorAll('.card-inner')[i].style.transform = 'rotateY(180deg)';
          document.getElementById(`read-${i}`).textContent = data.readings[i];
        }

        // 총평 추가
        const advice = document.createElement('div');
        advice.className = 'col-span-full mt-6 p-6 md:p-8 bg-gradient-to-br from-indigo-950/80 to-slate-900/80 rounded-2xl border border-indigo-500/40 text-center shadow-xl';
        advice.innerHTML = `<h4 class="text-indigo-200 font-bold text-lg mb-3">마스터의 조언</h4><p class="text-sm md:text-base text-slate-200 leading-loose break-keep">${data.conclusion}</p>`;
        container.appendChild(advice);

      } catch(e) {
        container.innerHTML = '<div class="col-span-full py-10 text-center"><p class="text-red-400">서버와 통신 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</p></div>';
      }
    }

    document.getElementById('btn-restart').addEventListener('click', () => location.reload());
  </script>
</body>
</html>
