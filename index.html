<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-Card Tarot Reading</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 3D Flip 및 애니메이션 관련 커스텀 CSS */
    .perspective-1000 { perspective: 1000px; }
    .transform-style-3d { transform-style: preserve-3d; }
    .backface-hidden { backface-visibility: hidden; }
    .rotate-y-180 { transform: rotateY(180deg); }
    .rotate-z-180 { transform: rotateZ(180deg); }
    
    .card-inner {
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* 스프레드 카드 호버 효과 */
    .spread-card {
      position: absolute;
      left: 50%;
      bottom: 40px;
      transform-origin: center center;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1;
      transform: translateX(calc(-50% + var(--tx, 0px))) translateY(var(--ty, 0px)) rotate(var(--rot, 0deg));
    }

    .spread-card.dealt:not(.is-selected):hover {
      z-index: 100 !important;
      transform: translateX(calc(-50% + var(--tx, 0px))) translateY(calc(var(--ty, 0px) - 40px)) rotate(var(--rot, 0deg)) scale(1.2) !important;
      filter: brightness(1.2) drop-shadow(0 0 30px rgba(129, 140, 248, 0.9));
      border-color: #a5b4fc;
    }

    #card-grid {
      position: relative;
      height: 400px;
      margin-top: 10px;
      perspective: 2500px;
      width: 100%;
      overflow: visible;
    }

    .spread-card.is-selected {
      z-index: 500 !important;
      opacity: 1 !important;
      pointer-events: none;
      filter: brightness(1.1) drop-shadow(0 0 25px rgba(129, 140, 248, 0.7));
    }

    /* 배열법 선택 카드 스타일 */
    .spread-type-card {
      @apply bg-slate-800 border-2 border-indigo-900/50 rounded-2xl p-4 cursor-pointer transition-all hover:border-indigo-500 hover:bg-slate-700/50 flex flex-col items-center text-center;
    }
    .spread-type-card.active {
      @apply border-indigo-400 bg-indigo-900/30 ring-2 ring-indigo-500/50;
    }

    /* 켈틱 크로스 등 복잡한 레이아웃을 위한 슬롯 컨테이너 */
    #selected-slots {
      position: relative;
      min-height: 400px;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .slot {
      @apply border-2 border-dashed border-indigo-700/40 rounded-lg flex flex-col items-center justify-center absolute transition-all duration-500;
      width: 80px;
      height: 130px;
    }
    @media (min-width: 768px) {
      .slot { width: 100px; height: 160px; }
    }

    .slot-label {
      @apply text-[10px] md:text-xs text-indigo-400 font-medium absolute -bottom-6 w-max whitespace-nowrap bg-slate-900/80 px-1 rounded;
    }

    /* 셔플 애니메이션 */
    @keyframes shuffle-anim {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(30px, -20px) rotate(10deg); }
      50% { transform: translate(-30px, 10px) rotate(-10deg); }
      75% { transform: translate(15px, 25px) rotate(5deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    .shuffling {
      animation: shuffle-anim 0.35s ease-in-out infinite;
    }
  </style>
</head>

      </div>
      <script>
        // 생년월일 드롭다운 초기화
        const yearSelect = document.getElementById('birth-year');
        const monthSelect = document.getElementById('birth-month');
        const daySelect = document.getElementById('birth-day');
        
        const currentYear = new Date().getFullYear();
        for (let y = currentYear; y >= currentYear - 100; y--) {
          const opt = document.createElement('option');
          opt.value = y; opt.textContent = `${y}년`;
          yearSelect.appendChild(opt);
        }
        for (let m = 1; m <= 12; m++) {
          const opt = document.createElement('option');
          opt.value = m; opt.textContent = `${m}월`;
          monthSelect.appendChild(opt);
        }
        for (let d = 1; d <= 31; d++) {
          const opt = document.createElement('option');
          opt.value = d; opt.textContent = `${d}일`;
          daySelect.appendChild(opt);
        }
        
        document.getElementById('shuffle-deck-visual').style.backgroundImage = 'url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Tarot_card_back_RWS.jpg")';
      </script>

      if (activeDot) activeDot.style.opacity = '1';
      
      currentSpread = card.dataset.spread;
    });

    // [3. 핵심 자바스크립트 로직]
    // Fisher-Yates 셔플 알고리즘
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 타이핑 애니메이션 효과
    function typeWriter(element, text, speed = 30) {
      let i = 0;
      element.textContent = "";
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }

    // 초기화 및 셔플 시작
    btnShuffle.addEventListener('click', () => {
      userConcern = inputConcern.value.trim() || "나의 전체적인 운세";
      userInfo = {
        year: document.getElementById('birth-year').value,
        month: document.getElementById('birth-month').value,
        day: document.getElementById('birth-day').value,
        gender: document.getElementById('user-gender').value
      };
      
      btnShuffle.classList.add('hidden');
      stateStart.querySelector('.max-w-4xl').classList.add('hidden'); 
      shuffleVisual.classList.remove('hidden');
      shuffleVisual.classList.add('shuffling');

      setTimeout(() => {
        shuffleVisual.classList.remove('shuffling');
        shuffledDeck = shuffleArray(tarotDeck);
        goToSpreadState();
      }, 1500);
    });

    // 스프레드 화면 렌더링
    function goToSpreadState() {
      stateStart.classList.add('hidden');
      stateSpread.classList.remove('hidden');
      
      const config = spreadConfigs[currentSpread];
      stateSpread.querySelector('h2').textContent = `카드를 ${config.count}장 선택해 주세요`;
      
      // 슬롯 생성 및 배치
      selectedSlots.innerHTML = '';
      config.layout.forEach((pos, i) => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        // 중심점(left:50%, top:50%) 기준으로 배치
        slot.style.left = `calc(50% + ${pos.x}px)`;
        slot.style.top = `calc(50% + ${pos.y}px)`;
        slot.style.transform = `translate(-50%, -50%) ${pos.rot ? `rotate(${pos.rot}deg)` : ''}`;
        
        const label = document.createElement('span');
        label.className = 'slot-label';
        label.textContent = config.positions[i];
        slot.appendChild(label);
        
        selectedSlots.appendChild(slot);
      });

      cardGrid.innerHTML = '';
      selectedCards = [];
      updateCounter();

      const totalCards = shuffledDeck.length;
      const spreadAngle = 150; 
      const startAngle = -(spreadAngle / 2);
      const angleStep = spreadAngle / (totalCards - 1);
      const radius = window.innerWidth > 768 ? 800 : 500; 

      shuffledDeck.forEach((card, index) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'spread-card w-12 h-20 md:w-16 md:h-28 bg-indigo-950 rounded-lg border border-indigo-400/30 cursor-pointer shadow-2xl bg-cover bg-center opacity-0';
        cardEl.style.backgroundImage = 'url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Tarot_card_back_RWS.jpg")';
        
        const currentAngle = startAngle + (index * angleStep);
        const rad = currentAngle * (Math.PI / 180);
        
        const tx = Math.sin(rad) * radius;
        const ty = (1 - Math.cos(rad)) * radius;
        
        cardEl.dataset.index = index;
        cardEl.addEventListener('click', handleCardSelect);
        cardGrid.appendChild(cardEl);

        setTimeout(() => {
          cardEl.classList.add('dealt');
          cardEl.style.opacity = '1';
          cardEl.style.setProperty('--tx', `${tx}px`);
          cardEl.style.setProperty('--ty', `${ty}px`);
          cardEl.style.setProperty('--rot', `${currentAngle}deg`);
        }, index * 20);
      });
    }

    // 카드 선택 핸들러
    function handleCardSelect(e) {
      const config = spreadConfigs[currentSpread];
      if (selectedCards.length >= config.count) return;
      
      const target = e.currentTarget;
      if (target.classList.contains('is-selected')) return; 

      const currentIdx = selectedCards.length; 
      const cardData = shuffledDeck[target.dataset.index];
      const isReversed = Math.random() < 0.3; // 30% 확률로 역방향
      
      selectedCards.push({ ...cardData, isReversed });
      target.classList.add('is-selected');

      const slots = document.querySelectorAll('#selected-slots .slot');
      const targetSlot = slots[currentIdx];
      
      const gridRect = cardGrid.getBoundingClientRect();
      const slotRect = targetSlot.getBoundingClientRect();
      
      const gridCenterX = gridRect.left + gridRect.width / 2;
      const cardHalfHeight = target.offsetHeight / 2;
      const gridCenterY = gridRect.bottom - 40 - cardHalfHeight;
      
      const slotCenterX = slotRect.left + slotRect.width / 2;
      const slotCenterY = slotRect.top + slotRect.height / 2;
      
      const finalTx = slotCenterX - gridCenterX;
      const finalTy = slotCenterY - gridCenterY;
      
      // 레이아웃에 회전값이 있으면 적용
      const layoutRot = config.layout[currentIdx].rot || 0;

      target.style.setProperty('--tx', `${finalTx}px`);
      target.style.setProperty('--ty', `${finalTy}px`);
      target.style.setProperty('--rot', `${layoutRot}deg`);
      target.style.zIndex = 1000 + currentIdx;

      updateCounter();

      if (selectedCards.length === config.count) {
        setTimeout(goToResultState, 1200);
      }
    }

    function updateCounter() {
      const config = spreadConfigs[currentSpread];
      selectionCounter.textContent = `선택된 카드: ${selectedCards.length} / ${config.count}`;
    }

    // 결과 화면 렌더링
    async function goToResultState() {
      stateSpread.classList.add('hidden');
      stateResult.classList.remove('hidden');
      
      const resultTitle = stateResult.querySelector('h2');
      resultTitle.textContent = `타로 마스터가 "${spreadConfigs[currentSpread].name}" 배열로 분석 중입니다...`;
      
      resultContainer.innerHTML = '';
      // 결과 그리드 조정 (장수가 많으면 촘촘하게)
      const config = spreadConfigs[currentSpread];
      if (config.count > 6) {
        resultContainer.className = 'grid grid-cols-2 md:grid-cols-5 gap-4';
      } else if (config.count === 1) {
        resultContainer.className = 'flex justify-center';
      } else {
        resultContainer.className = 'grid grid-cols-1 md:grid-cols-3 gap-8';
      }

      const cardNodes = [];
      selectedCards.forEach((card, idx) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'flex flex-col items-center bg-slate-800/40 p-4 rounded-2xl border border-indigo-500/20';

        const posName = spreadConfigs[currentSpread].positions[idx];
        const positionTitle = document.createElement('h3');
        positionTitle.className = 'text-sm font-bold mb-3 text-indigo-300';
        positionTitle.textContent = `[${posName}]`;

        const card3DContainer = document.createElement('div');
        card3DContainer.className = `perspective-1000 ${config.count > 6 ? 'w-28 h-44' : 'w-44 h-72 md:w-52 md:h-80'} mb-4 cursor-pointer`;
        
        const cardInner = document.createElement('div');
        cardInner.className = 'card-inner relative w-full h-full transform-style-3d';
        
        const cardBack = document.createElement('div');
        cardBack.className = 'card-back absolute w-full h-full backface-hidden bg-indigo-900 rounded-lg border-2 border-indigo-400/50 bg-cover bg-center';
        cardBack.style.backgroundImage = 'url("https://upload.wikimedia.org/wikipedia/commons/5/5c/Tarot_card_back_RWS.jpg")';
        
        const cardFront = document.createElement('div');
        cardFront.className = 'card-front absolute w-full h-full backface-hidden rotate-y-180 rounded-lg overflow-hidden bg-white border-2 border-indigo-300';
        
        const cardImg = document.createElement('img');
        cardImg.src = card.image;
        cardImg.alt = card.name;
        cardImg.className = 'w-full h-full object-fill';
        if (card.isReversed) cardImg.classList.add('rotate-z-180');

        cardFront.appendChild(cardImg);
        cardInner.appendChild(cardBack);
        cardInner.appendChild(cardFront);
        card3DContainer.appendChild(cardInner);

        const infoDiv = document.createElement('div');
        infoDiv.className = 'opacity-0 transition-opacity duration-500 text-center';
        
        const cardName = document.createElement('h4');
        cardName.className = 'text-sm font-bold text-white mb-2';
        cardName.textContent = `${card.name} ${card.isReversed ? '(역)' : '(정)'}`;
        
        const cardMeaning = document.createElement('p');
        cardMeaning.className = 'text-xs text-slate-300 leading-relaxed text-left';

        infoDiv.appendChild(cardName);
        infoDiv.appendChild(cardMeaning);
        wrapper.appendChild(positionTitle);
        wrapper.appendChild(card3DContainer);
        wrapper.appendChild(infoDiv);
        resultContainer.appendChild(wrapper);
        
        cardNodes.push({ inner: cardInner, info: infoDiv, text: cardMeaning });
      });

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            concern: userConcern,
            userInfo: userInfo,
            spreadName: spreadConfigs[currentSpread].name,
            positions: spreadConfigs[currentSpread].positions,
            cards: selectedCards.map(c => ({ name: c.name, isReversed: c.isReversed }))
          })
        });

        const aiData = await response.json();
        
        resultTitle.textContent = `"${userConcern}" 리딩 결과`;

        // 하나씩 카드 공개
        for (let i = 0; i < cardNodes.length; i++) {
          const node = cardNodes[i];
          const interpretation = aiData.readings[i];
          if (!interpretation) continue; 
          
          await new Promise(res => setTimeout(res, 400)); 
          node.inner.style.transform = 'rotateY(180deg)';
          node.info.classList.remove('opacity-0');
          typeWriter(node.text, interpretation, 20);
          // 장수가 많으면 기다리는 시간을 줄임
          await new Promise(res => setTimeout(res, config.count > 5 ? 1000 : 2000));
        }

        const totalReading = document.createElement('div');
        totalReading.className = 'col-span-full mt-10 p-8 bg-indigo-950/40 rounded-3xl border border-indigo-500/30 text-center max-w-3xl mx-auto opacity-0 transition-opacity duration-1000';
        totalReading.innerHTML = `<h4 class="text-xl font-bold text-indigo-300 mb-4">마스터의 최종 조언</h4><p class="text-slate-200 leading-relaxed"></p>`;
        resultContainer.appendChild(totalReading);
        
        setTimeout(() => {
          totalReading.classList.remove('opacity-0');
          typeWriter(totalReading.querySelector('p'), aiData.conclusion, 30);
        }, 500);

      } catch (error) {
        console.error(error);
        resultTitle.textContent = "AI 리딩 중 오류가 발생했습니다.";
      }
    }

    btnRestart.addEventListener('click', () => {
      stateResult.classList.add('hidden');
      stateStart.classList.remove('hidden');
      btnShuffle.classList.remove('hidden');
      stateStart.querySelector('.max-w-4xl').classList.remove('hidden');
      shuffleVisual.classList.add('hidden');
      selectedCards = [];
    });
  </script>

</body>
</html>
